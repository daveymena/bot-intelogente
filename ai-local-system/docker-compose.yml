version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tecnovariedades-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tecnovariedades}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tecno2025}
      POSTGRES_DB: ${POSTGRES_DB:-tecnovariedades}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tecnovariedades"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tecnovariedades-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: tecnovariedades-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tecnovariedades-network

  # Core AI Service (Python FastAPI)
  core-ai:
    build:
      context: ./core-ai
      dockerfile: Dockerfile
    container_name: tecnovariedades-core-ai
    ports:
      - "8000:8000"
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-tecnovariedades}:${POSTGRES_PASSWORD:-tecno2025}@postgres:5432/${POSTGRES_DB:-tecnovariedades}
      
      # Vector DB
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      
      # AI Models
      AI_MODEL: ${AI_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      INTENT_MODEL_PATH: /app/models/intent_ft.bin
      
      # Configuration
      MAX_TOKENS: 512
      TEMPERATURE: 0.7
      TOP_K_RETRIEVAL: 5
      CONFIDENCE_THRESHOLD: 0.75
      
      # Training
      AUTO_TRAIN_ENABLED: "true"
      AUTO_TRAIN_INTERVAL: 86400  # 24 hours
      MIN_SAMPLES_FOR_TRAIN: 100
      
      # Logging
      LOG_LEVEL: INFO
      
    volumes:
      - ./core-ai:/app
      - ./data:/data
      - ai_models:/app/models
      - training_data:/app/training
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - tecnovariedades-network
    restart: unless-stopped

  # Gateway WhatsApp (Node.js + Baileys)
  gateway-whatsapp:
    build:
      context: ./gateway-whatsapp
      dockerfile: Dockerfile
    container_name: tecnovariedades-gateway
    ports:
      - "4000:4000"
    environment:
      # Core AI Service
      CORE_AI_URL: http://core-ai:8000
      
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-tecnovariedades}:${POSTGRES_PASSWORD:-tecno2025}@postgres:5432/${POSTGRES_DB:-tecnovariedades}
      
      # WhatsApp
      WHATSAPP_SESSION_PATH: /sessions
      WHATSAPP_AUTO_RECONNECT: "true"
      WHATSAPP_MAX_RETRIES: 5
      
      # Business Info
      BUSINESS_NAME: "Tecnovariedades D&S"
      BUSINESS_PHONE: "+573136174267"
      
      # Payment Methods
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      
      # Configuration
      NODE_ENV: production
      PORT: 4000
      
    volumes:
      - ./gateway-whatsapp:/app
      - whatsapp_sessions:/sessions
      - whatsapp_media:/media
    depends_on:
      - core-ai
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - tecnovariedades-network
    restart: unless-stopped

  # Dashboard Frontend (React)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: tecnovariedades-dashboard
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_AI_API_URL: http://localhost:8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-tecnovariedades}:${POSTGRES_PASSWORD:-tecno2025}@postgres:5432/${POSTGRES_DB:-tecnovariedades}
    volumes:
      - ./dashboard:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - gateway-whatsapp
      - core-ai
    networks:
      - tecnovariedades-network
    restart: unless-stopped

  # Redis (opcional - para caché y jobs)
  redis:
    image: redis:7-alpine
    container_name: tecnovariedades-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tecnovariedades-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  ai_models:
    driver: local
  training_data:
    driver: local
  whatsapp_sessions:
    driver: local
  whatsapp_media:
    driver: local
  redis_data:
    driver: local

networks:
  tecnovariedades-network:
    driver: bridge
