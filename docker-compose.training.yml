# Docker Compose para Sistema de Entrenamiento 24/7
version: '3.8'

services:
  # Ollama - Motor de IA Local
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-training
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # Sistema de Entrenamiento
  training:
    build:
      context: .
      dockerfile: Dockerfile.training
    container_name: auto-training-system
    restart: unless-stopped
    depends_on:
      - ollama
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=gemma2:2b
    volumes:
      - ./data:/app/data
      - training-logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3

  # Aplicación Principal (opcional, si quieres correr todo junto)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-bot
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=gemma2:2b
      - AI_FALLBACK_ENABLED=true
    volumes:
      - ./auth_sessions:/app/auth_sessions
      - ./data:/app/data

volumes:
  ollama-data:
    driver: local
  training-logs:
    driver: local
